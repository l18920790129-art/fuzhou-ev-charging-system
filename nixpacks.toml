[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["python3.11 -m pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python3.11 manage.py collectstatic --noinput",
  "python3.11 manage.py migrate --noinput || true",
  "python3.11 data/init_fuzhou_data.py || true",
  "python3.11 knowledge_base/build_knowledge_base.py || true"
]

[start]
cmd = "gunicorn fuzhou_ev_charging.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
