version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=fuzhou_ev_charging.settings
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - AMAP_API_KEY=${AMAP_API_KEY:-283b21e285a807bf7bda4cf43e838a26}
      - DATABASE_URL=postgresql://fuzhou_admin:fuzhou_pass@db:5432/fuzhou_ev
      - CHROMA_PERSIST_DIR=/app/knowledge_base/chroma_db
      - ALLOWED_HOSTS=*
    volumes:
      - chroma_data:/app/knowledge_base/chroma_db
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=fuzhou_ev
      - POSTGRES_USER=fuzhou_admin
      - POSTGRES_PASSWORD=fuzhou_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuzhou_admin -d fuzhou_ev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  media_data:
